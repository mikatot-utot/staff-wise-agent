<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
    <title>Staff Wise Agent</title>
    <style>
      * { box-sizing: border-box; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
      body { margin: 0; padding: 24px; background: #07070a; color: #f3f4f6; }
      h1 { font-size: 18px; margin: 0 0 4px; font-weight: 700; letter-spacing: -0.01em; }
      h1 .mark { color: #b6f09c; }
      .sub { font-size: 12px; color: #8a8a90; margin-bottom: 20px; }
      label { display: block; font-size: 12px; color: #8a8a90; margin: 12px 0 4px; }
      input {
        width: 100%; padding: 9px 10px; border: 1px solid #232326; border-radius: 8px;
        font-size: 14px; background: #0f0f12; color: #f3f4f6;
      }
      input::placeholder { color: #5d5d63; }
      button {
        width: 100%; margin-top: 16px; padding: 10px; border: 0; border-radius: 8px;
        background: #ea580c; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      button:hover { opacity: 0.92; }
      button.secondary { background: transparent; color: #f3f4f6; border: 1px solid #232326; font-weight: 500; }
      button.secondary:hover { background: #1c1c20; opacity: 1; }
      .err { color: #f87171; font-size: 13px; margin-top: 10px; min-height: 16px; }
      .card { background: #141416; border: 1px solid #232326; border-radius: 14px; padding: 16px; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; }
      .row { display: flex; align-items: center; font-size: 14px; margin-bottom: 8px; }
      .muted { color: #8a8a90; font-size: 12px; }
      .foot { color: #6b6b70; font-size: 11px; margin-top: 16px; text-align: center; }
      .foot .mark { color: #b6f09c; font-weight: 600; }
      .hide { display: none; }
    </style>
  </head>
  <body>
    <h1><span class="mark">◣</span> Staff Wise Agent</h1>
    <div class="sub">Tracks your work time and activity while you&rsquo;re on shift.</div>

    <div id="loginView">
      <div class="card">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" />
        <div class="err" id="err"></div>
        <button id="loginBtn">Sign in</button>
        <div class="muted" style="margin-top:10px">First time? The password you type becomes your password.</div>
      </div>
    </div>

    <div id="trackingView" class="hide">
      <div class="card">
        <div class="row"><span class="dot" id="dot"></span><strong id="who"></strong></div>
        <div class="row" id="statusLine"></div>
        <div class="muted" id="pending"></div>
        <div class="muted" id="server" style="margin-top:6px"></div>
        <button id="trackBtn" style="margin-top:16px">Start tracking</button>
        <button class="secondary" id="logoutBtn" style="margin-top:8px">Sign out</button>
        <button class="secondary" id="quitBtn" style="margin-top:8px">Quit</button>
      </div>
    </div>

    <div class="foot">Powered by <span class="mark">mikatot</span></div>

    <script src="renderer.js"></script>
  </body>
</html>
