<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
    <title>Biukin Agent</title>
    <style>
      * { box-sizing: border-box; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
      body { margin: 0; padding: 24px; background: #f6f7f9; color: #1a1d21; }
      h1 { font-size: 18px; margin: 0 0 4px; color: #0e7490; }
      .sub { font-size: 12px; color: #6b7280; margin-bottom: 20px; }
      label { display: block; font-size: 12px; color: #6b7280; margin: 12px 0 4px; }
      input { width: 100%; padding: 9px 10px; border: 1px solid #e3e6ea; border-radius: 8px; font-size: 14px; }
      button { width: 100%; margin-top: 16px; padding: 10px; border: 0; border-radius: 8px; background: #0e7490; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
      button.secondary { background: #fff; color: #1a1d21; border: 1px solid #e3e6ea; font-weight: 500; }
      .err { color: #dc2626; font-size: 13px; margin-top: 10px; min-height: 16px; }
      .card { background: #fff; border: 1px solid #e3e6ea; border-radius: 12px; padding: 16px; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 7px; }
      .row { display: flex; align-items: center; font-size: 14px; margin-bottom: 8px; }
      .muted { color: #6b7280; font-size: 12px; }
      .hide { display: none; }
    </style>
  </head>
  <body>
    <h1>Biukin Agent</h1>
    <div class="sub">Tracks your work time and activity.</div>

    <div id="loginView">
      <div class="card">
        <label>Email</label>
        <input id="email" type="email" placeholder="you@example.com" />
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" />
        <div class="err" id="err"></div>
        <button id="loginBtn">Sign in &amp; start tracking</button>
        <div class="muted" style="margin-top:10px">First time? The password you type becomes your password.</div>
      </div>
    </div>

    <div id="trackingView" class="hide">
      <div class="card">
        <div class="row"><span class="dot" id="dot"></span><strong id="who"></strong></div>
        <div class="row" id="statusLine"></div>
        <div class="muted" id="pending"></div>
        <div class="muted" id="server" style="margin-top:6px"></div>
        <button class="secondary" id="logoutBtn" style="margin-top:18px">Sign out</button>
        <button class="secondary" id="quitBtn" style="margin-top:8px">Stop &amp; quit</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
